server {
  listen 192.168.1.255:8080;

  server_name my_server;

  error_page 404 /errors/404.html;

  client_max_body_size 10000000;

  location / {
    root www/html;
    index index.html index.htm index.php;
    methods GET POST;
  }

  location /oldpage {
    redirect https://google.com;
  }

  location /upload {
    root www/uploads;
    methods POST;
    upload_store ../tmp/uploads;
  }
  
  location /files {
    root www/files;
    autoindex on;
  }

  location /readonly {
    root www/readonly;
    methods GET;
  }

  location /cgi-bin {
    root www/cgi-bin;
    methods GET POST;
    cgi .php /usr/bin/php-cgi;
    cgi .py /usr/bin/python3;
  }

  location /secret {
    methods NONE;
  }
}