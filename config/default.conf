server {
  listen localhost:8080;

  server_name my_server;

  error_page 404 /errors/404.html;

  client_max_body_size 150000000;

  location / {
    root www/html;
    index index.html index.htm index.php;
    methods GET;
  }

  location /oldpage {
    redirect https://google.com;
  }

  location /upload {
    root www/uploads;
    methods POST DELETE;
    upload_store www/uploads;
  }
  
  location /files {
    root www/files;
    autoindex on;
    methods GET;
  }

  location /readonly {
    root www/readonly;
    methods GET;
  }

  location /cgi-bin {
    root www/cgi-bin;
    methods GET POST DELETE;
    cgi .php /usr/bin/php-cgi;
    cgi .py /usr/bin/python3;
  }

  location /secret {
    methods NONE;
  }

  location ~/.py$ {
    cgi .py /usr/bin/python3;
    methods GET POST
  }
}

server {
  listen 127.0.0.1:8082;

  server_name another_server;

  error_page 404 /errors/404.html;

  client_max_body_size 5000000;

  location / {
    root www/html2;
    index index.html index.htm;
    methods GET POST DELETE;
  }

  location /data {
    root www/html/src;
    autoindex on;
    methods GET;
  }
}

