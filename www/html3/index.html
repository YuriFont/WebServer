<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Yasuo — Teste com Imagens</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
      margin: 0;
      background: #222;
      border-bottom: 1px solid #444;
    }

    .section {
      margin: 30px auto;
      width: 90%;
      max-width: 1000px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }

    .section h2 {
      margin-top: 0;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
      box-shadow: 0 0 12px #000;
    }

    .server-box {
      margin-top: 20px;
      background: #222;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #333;
    }
  </style>
</head>

<body>

<h1>Yasuo — Teste de Porta + Galeria Oficial</h1>

<div class="section">
  <h2>Imagem 1 — Yasuo (Splash Concept)</h2>
  <img src="https://wiki.leagueoflegends.com/en-us/File:Yasuo_Splash_Concept_01.png?raw=1" alt="Yasuo Splash Concept">
</div>

<div class="section">
  <h2>Imagem 2 — Yasuo Foreseen (Skin)</h2>
  <img src="https://wiki.leagueoflegends.com/en-us/File:Yasuo_Foreseen_Splash_Concept_01.jpg?raw=1" alt="Yasuo Foreseen Skin">
</div>

<div class="section">
  <h2>Imagem 3 — Yasuo True Damage</h2>
  <img src="https://wiki.leagueoflegends.com/en-us/File:Yasuo_TrueDamage_Splash_Concept_01.jpg?raw=1" alt="Yasuo True Damage">
</div>

<div class="section">
  <h2>Imagem 4 — Yasuo Spirit Blossom</h2>
  <img src="https://wiki.leagueoflegends.com/en-us/File:Yasuo_SpiritBlossom_Splash_Concept_01.jpg?raw=1" alt="Yasuo Spirit Blossom">
</div>

<div class="section">
  <h2>Informações do Servidor</h2>
  <div class="server-box">
    <div><strong>Hostname:</strong> <span id="host"></span></div>
    <div><strong>Porta:</strong> <span id="port"></span></div>
    <div><strong>URL:</strong> <span id="url"></span></div>
  </div>
</div>

<script>
  document.getElementById("host").innerText = window.location.hostname;
  document.getElementById("port").innerText = window.location.port || "(padrão)";
  document.getElementById("url").innerText = window.location.href;
</script>

</body>
</html>
